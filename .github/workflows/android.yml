name: Android CI

on: [push, workflow_dispatch]

permissions:
  contents: write # rolling "latest" release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # git-derived version: rev-list --count is silently wrong on shallow clones

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - name: Test and build debug APK
        run: ./gradlew test assembleDebug "-POPENSUBTITLES_API_KEY=${{ secrets.OPENSUBTITLES_API_KEY }}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: videocast-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      # Artifacts expire (max 90 days on public repos) and need a login to
      # download; the durable install channel is a rolling prerelease with a
      # permanent tap-to-download APK link. Master only: side branches must
      # not hijack the release (their commit counts could also collide).
      - name: Publish rolling "latest" release
        if: github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COUNT=$(git rev-list --count HEAD)
          NAME="videocast-r${COUNT}-${GITHUB_SHA::7}.apk"
          cp app/build/outputs/apk/debug/app-debug.apk "$NAME"
          git tag -f latest && git push -f origin latest
          gh release delete latest -y || true
          gh release create latest "$NAME" --prerelease \
            --title "VideoCast r${COUNT}" \
            --notes "Auto-build of ${GITHUB_SHA::7}."

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/tests/
